# Dataset configuration for the processed Vistas YOLO dataset.
# Paths are relative to the project root directory.

path: ./data/processed/vistas_yolo/
train: train/images      # training images (relative to 'path')
val: val/images          # validation images (relative to 'path')
test: test/images        # test images (relative to 'path')

# Class names must be in alphabetical order to match the IDs assigned by the data preparation script.
names:
  - banner
  - barrier
  - fire-hydrant
  - mailbox
  - sign
  - traffic_light
  - traffic_sign
  - utility_pole
