# === DATA SETTINGS ===
data:
  root: "data/processed/clip_vibe"
  metadata_csv: "data/processed/clip_vibe/metadata.csv"
  image_column: "filename"
  country_column: "class_name"
  content_column: "search_term"
  image_size: 224
  num_workers: 4
  val_split_size: 0.15
  test_split_size: 0.15

# === MODEL SETTINGS ===
model:
  backbone: "clip"
  pretrained_name: "openai/clip-vit-base-patch32"
  freeze_backbone: true
  hidden_dims: [1024, 512, 128]
  dropout: 0.1

# === TRAINING SETTINGS ===
training:
  batch_size: 4
  num_epochs: 20
  lr_head: 0.0001
  embedding_noise_level: 0
  seed: 100
  device: "mps" # Changed from cuda for local testing, user can change back
  use_weighted_sampling: false
  use_stratification: true
  lr_scheduler_step_size: 5
  lr_scheduler_gamma: 0.1

# === EVALUATION SETTINGS ===
eval:
  save_dir: "runs/clip_vibe"
