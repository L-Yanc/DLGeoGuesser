# === DATA SETTINGS ===
data:
  root: "data/processed/geohints_processed"
  metadata_csv: "data/processed/geohints_processed/metadata.csv"
  image_column: "filename"
  country_column: "country"
  content_column: "content"
  image_size: 224
  num_workers: 4
  val_split_size: 0.15
  test_split_size: 0.15

# === MODEL SETTINGS ===
model:
  backbone: "dino"
  pretrained_name: "facebook/dinov2-base"
  freeze_backbone: true
  hidden_dims: [1024, 1024, 512, 128]
  dropout: 0.1

# === TRAINING SETTINGS ===
training:
  batch_size: 32
  num_epochs: 30
  lr_head: 0.001
  embedding_noise_level: 0.07
  seed: 100
  device: "mps" # Changed from cuda for local testing, user can change back
  use_weighted_sampling: false
  use_stratification: true

# === EVALUATION SETTINGS ===
eval:
  save_dir: "runs/dino"
